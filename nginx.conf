server {
    listen 80;
    server_name news.ernestofgaia.xyz;

    # Redirect HTTP to HTTPS (TLS terminated at host reverse proxy)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name news.ernestofgaia.xyz;

    # TLS certs managed by host (Certbot / Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/news.ernestofgaia.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/news.ernestofgaia.xyz/privkey.pem;

    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
